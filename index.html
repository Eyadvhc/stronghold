<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم إياد</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; }
        .phone-frame { 
            position: relative; 
            display: inline-block; 
            border: 10px solid #333; 
            border-radius: 20px; 
            overflow: hidden; 
            margin-top: 20px;
        }
        /* صورة البث القادمة من Screen Stream */
        #screen-view { width: 350px; height: auto; display: block; }
        /* طبقة اللمس الشفافة */
        #touch-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 100; cursor: crosshair; 
        }
        .info { margin-top: 10px; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>
    <h2>جهازك الآن تحت التحكم 📱</h2>
    
    <div class="phone-frame">
        <img id="screen-view" src="http://192.168.1.4:8080/screen.mjpeg">
        <div id="touch-layer"></div>
    </div>

    <div class="info">اضغط على الصورة للتحكم في الهاتف الحقيقي</div>

    <script>
        const layer = document.getElementById('touch-layer');
        const SERVER_IP = "192.168.1.4"; // IP هاتفك

        layer.addEventListener('click', (e) => {
            const rect = layer.getBoundingClientRect();
            // تحويل إحداثيات المتصفح لإحداثيات الهاتف (تعدل حسب دقة شاشتك)
            const x = Math.round((e.clientX - rect.left) * (1080 / rect.width));
            const y = Math.round((e.clientY - rect.top) * (2400 / rect.height));

            // إرسال الأمر لسيرفر Termux
            fetch(`http://${SERVER_IP}:5000/action?type=tap&x=${x}&y=${y}`)
                .then(() => console.log(`تم الضغط: ${x}, ${y}`))
                .catch(err => alert("تأكد من تشغيل Termux!"));
        });
    </script>
</body>
</html>
