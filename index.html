<button onclick="save_game()">حفظ التقدم (Save State)</button>
<button onclick="load_game()">تحميل التقدم (Load State)</button>

<script>
    // دالة لحفظ حالة اللعبة في ذاكرة المتصفح
    function save_game() {
        emulator.save_state(function(err, state) {
            if (err) {
                console.error(err);
                return;
            }
            // تخزين الحالة في IndexedDB أو LocalStorage
            const state_string = btoa(String.fromCharCode.apply(null, new Uint8Array(state)));
            localStorage.setItem("stronghold_save", state_string);
            alert("تم حفظ اللعبة في ذاكرة المتصفح!");
        });
    }

    // دالة لتحميل الحالة المحفوظة
    function load_game() {
        const state_string = localStorage.getItem("stronghold_save");
        if (!state_string) {
            alert("لا يوجد ملف حفظ سابق!");
            return;
        }
        const state_array = new Uint8Array(atob(state_string).split("").map(c => c.charCodeAt(0)));
        emulator.restore_state(state_array);
        alert("تمت استعادة اللعبة!");
    }
</script>
